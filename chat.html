<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
    <title>COMMS Terminal</title>
    <style>
        :root {
            --term-green: #00ff88;
            --term-cyan: #00d4ff;
            --term-amber: #ffaa00;
            --term-red: #ff3344;
            --term-dim: #446655;
            --term-bg: #0a0c0a;
            --term-grid: rgba(0, 255, 136, 0.03);
            --font-mono: 'Consolas', 'Courier New', monospace;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--term-bg);
            font-family: var(--font-mono);
            margin: 0;
            padding: 0;
        }
        
        /* Scanline overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.15) 2px,
                rgba(0, 0, 0, 0.15) 4px
            );
            pointer-events: none;
            z-index: 1000;
        }
        
        /* Grid background */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(var(--term-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--term-grid) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            z-index: -1;
        }
        
        .terminal-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--term-green);
            box-sizing: border-box;
        }
        
        /* Corner brackets */
        .terminal-container::before,
        .terminal-container::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border-color: var(--term-green);
            border-style: solid;
            z-index: 10;
        }
        .terminal-container::before {
            top: 4px;
            left: 4px;
            border-width: 2px 0 0 2px;
        }
        .terminal-container::after {
            bottom: 4px;
            right: 4px;
            border-width: 0 2px 2px 0;
        }
        
        /* Header */
        .terminal-header {
            display: flex;
            flex-shrink: 0;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: linear-gradient(180deg, #0f120f 0%, #080a08 100%);
            border-bottom: 1px solid var(--term-green);
            -webkit-app-region: drag;
            cursor: grab;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .classification {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--term-red);
            background: rgba(255, 51, 68, 0.15);
            padding: 2px 6px;
            border: 1px solid var(--term-red);
        }
        
        .terminal-title {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: var(--term-green);
            text-shadow: 0 0 8px var(--term-green);
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-center {
            display: flex;
            align-items: center;
            gap: 6px;
            -webkit-app-region: no-drag;
        }
        
        .header-btn {
            font-family: var(--font-mono);
            font-size: 7px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--term-dim);
            background: transparent;
            border: 1px solid var(--term-dim);
            padding: 2px 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .header-btn:hover {
            color: var(--term-green);
            border-color: var(--term-green);
        }
        
        .header-btn.active {
            color: var(--term-green);
            border-color: var(--term-green);
            background: rgba(0, 255, 136, 0.15);
            text-shadow: 0 0 4px var(--term-green);
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 8px;
            color: var(--term-dim);
            letter-spacing: 1px;
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--term-green);
            box-shadow: 0 0 6px var(--term-green);
            animation: pulse-dot 2s ease-in-out infinite;
        }
        
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .close-btn {
            -webkit-app-region: no-drag;
            background: transparent;
            border: 1px solid var(--term-dim);
            color: var(--term-dim);
            font-size: 12px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .close-btn:hover {
            border-color: var(--term-red);
            color: var(--term-red);
            box-shadow: 0 0 8px rgba(255, 51, 68, 0.5);
        }
        
        /* Info bar */
        .info-bar {
            display: flex;
            flex-shrink: 0;
            justify-content: space-between;
            padding: 4px 12px;
            background: rgba(0, 255, 136, 0.03);
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
            font-size: 8px;
            color: var(--term-dim);
            letter-spacing: 1px;
        }
        
        .timestamp {
            font-variant-numeric: tabular-nums;
        }
        
        /* XP/Level bar */
        .level-bar {
            display: flex;
            flex-shrink: 0;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            background: rgba(255, 170, 0, 0.03);
            border-bottom: 1px solid rgba(255, 170, 0, 0.15);
            font-size: 8px;
            color: var(--term-amber);
            letter-spacing: 1px;
        }
        
        .level-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
            padding: 2px 6px;
            background: rgba(255, 170, 0, 0.15);
            border: 1px solid var(--term-amber);
            font-weight: 700;
            font-size: 9px;
            text-shadow: 0 0 6px var(--term-amber);
        }
        
        .xp-progress-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .xp-progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 7px;
            color: var(--term-dim);
        }
        
        .xp-progress-bar {
            height: 6px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 170, 0, 0.3);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }
        
        .xp-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--term-amber), #ffcc00);
            box-shadow: 0 0 8px rgba(255, 170, 0, 0.5);
            transition: width 0.3s ease;
            position: relative;
        }
        
        .xp-progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: xp-shine 2s ease-in-out infinite;
        }
        
        @keyframes xp-shine {
            0%, 100% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
        }
        
        .xp-total {
            font-size: 7px;
            color: var(--term-dim);
            min-width: 50px;
            text-align: right;
        }
        
        .level-up-flash {
            animation: level-up-glow 0.5s ease-out;
        }
        
        @keyframes level-up-glow {
            0% { 
                background: rgba(255, 170, 0, 0.4);
                box-shadow: 0 0 20px var(--term-amber);
            }
            100% { 
                background: rgba(255, 170, 0, 0.03);
                box-shadow: none;
            }
        }
        
        .level-down-flash {
            animation: level-down-glow 0.5s ease-out;
        }
        
        @keyframes level-down-glow {
            0% { 
                background: rgba(255, 50, 50, 0.4);
                box-shadow: 0 0 20px #ff3232;
            }
            100% { 
                background: rgba(255, 170, 0, 0.03);
                box-shadow: none;
            }
        }
        
        .xp-loss-flash {
            animation: xp-loss-blink 0.3s ease-out;
        }
        
        @keyframes xp-loss-blink {
            0%, 100% { color: var(--term-dim); }
            50% { color: #ff5050; }
        }
        
        .attention-warning {
            animation: attention-pulse 1s ease-in-out infinite;
        }
        
        @keyframes attention-pulse {
            0%, 100% { 
                background: rgba(255, 170, 0, 0.03);
                border-color: var(--term-amber);
            }
            50% { 
                background: rgba(255, 50, 50, 0.2);
                border-color: #ff5050;
            }
        }
        
        /* Rank badge */
        .rank-badge {
            font-size: 7px;
            color: var(--term-cyan);
            background: rgba(0, 212, 255, 0.15);
            border: 1px solid var(--term-cyan);
            padding: 1px 4px;
            letter-spacing: 0.5px;
        }
        
        /* Needs bars (hunger/energy) */
        .needs-bar {
            display: flex;
            flex-shrink: 0;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            background: rgba(0, 255, 136, 0.02);
            border-bottom: 1px solid rgba(0, 255, 136, 0.1);
            font-size: 7px;
            letter-spacing: 1px;
        }
        
        .need-item {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
        }
        
        .need-label {
            color: var(--term-dim);
            min-width: 24px;
        }
        
        .need-progress {
            flex: 1;
            height: 4px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .need-fill {
            height: 100%;
            transition: width 0.3s ease, background 0.3s ease;
        }
        
        .need-fill.hunger {
            background: linear-gradient(90deg, #ff6b35, #ffaa00);
        }
        
        .need-fill.energy {
            background: linear-gradient(90deg, #00d4ff, #00ff88);
        }
        
        .need-fill.low {
            background: linear-gradient(90deg, #ff3344, #ff6600) !important;
            animation: need-low-pulse 1s ease-in-out infinite;
        }
        
        @keyframes need-low-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .need-value {
            color: var(--term-dim);
            min-width: 20px;
            text-align: right;
        }
        
        /* Stats panel */
        .stats-panel {
            display: none;
            flex-shrink: 0;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(0, 255, 136, 0.1);
            font-size: 8px;
            color: var(--term-dim);
            letter-spacing: 0.5px;
        }
        
        .stats-panel.visible {
            display: block;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .stat-label {
            color: var(--term-dim);
            font-size: 7px;
        }
        
        .stat-value {
            color: var(--term-green);
            font-size: 9px;
            font-weight: 600;
        }
        
        /* Pomodoro bar */
        .pomodoro-bar {
            display: none;
            flex-shrink: 0;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(255, 100, 100, 0.05);
            border-bottom: 1px solid rgba(255, 100, 100, 0.2);
            font-size: 8px;
        }
        
        .pomodoro-bar.visible {
            display: flex;
        }
        
        .pomodoro-bar.work-mode {
            background: rgba(255, 100, 100, 0.08);
            border-color: rgba(255, 100, 100, 0.3);
        }
        
        .pomodoro-bar.break-mode {
            background: rgba(100, 255, 100, 0.08);
            border-color: rgba(100, 255, 100, 0.3);
        }
        
        .pomo-mode {
            font-weight: 700;
            letter-spacing: 1px;
            min-width: 40px;
        }
        
        .pomo-mode.work { color: #ff6b6b; }
        .pomo-mode.break { color: #6bff6b; }
        
        .pomo-timer {
            flex: 1;
            font-size: 14px;
            font-weight: 700;
            color: var(--term-amber);
            text-shadow: 0 0 8px var(--term-amber);
            text-align: center;
            font-variant-numeric: tabular-nums;
        }
        
        .pomo-progress {
            flex: 2;
            height: 6px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .pomo-progress-fill {
            height: 100%;
            background: var(--term-amber);
            transition: width 1s linear;
        }
        
        .pomo-count {
            color: var(--term-dim);
            font-size: 7px;
        }
        
        .pomo-btn {
            font-family: var(--font-mono);
            font-size: 7px;
            font-weight: 700;
            letter-spacing: 0.5px;
            padding: 3px 8px;
            border: 1px solid;
            background: transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .pomo-btn.start {
            color: var(--term-green);
            border-color: var(--term-green);
        }
        
        .pomo-btn.start:hover {
            background: var(--term-green);
            color: #000;
        }
        
        .pomo-btn.stop {
            color: var(--term-red);
            border-color: var(--term-red);
        }
        
        .pomo-btn.stop:hover {
            background: var(--term-red);
            color: #000;
        }
        
        /* Messages area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 0;
            padding: 12px;
            background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, transparent 100%);
        }
        
        .message {
            margin-bottom: 12px;
            padding: 8px 10px;
            font-size: 11px;
            line-height: 1.5;
            border-left: 2px solid;
            position: relative;
        }
        
        .message::before {
            content: attr(data-time);
            position: absolute;
            top: -14px;
            left: 0;
            font-size: 7px;
            color: var(--term-dim);
            letter-spacing: 1px;
        }
        
        .message.user {
            background: rgba(0, 212, 255, 0.08);
            border-color: var(--term-cyan);
            color: #aaddff;
            margin-left: 24px;
        }
        
        .message.user::after {
            content: var(--operator-label, 'OPERATOR');
            position: absolute;
            top: -14px;
            right: 0;
            font-size: 7px;
            color: var(--term-cyan);
            letter-spacing: 1px;
        }
        
        .message.assistant {
            background: rgba(0, 255, 136, 0.06);
            border-color: var(--term-green);
            color: #aaffcc;
            margin-right: 24px;
        }
        
        .message.assistant::after {
            content: var(--bro-label, 'BRO');
            position: absolute;
            top: -14px;
            right: 0;
            font-size: 7px;
            color: var(--term-green);
            letter-spacing: 1px;
        }
        
        .message.system {
            background: rgba(255, 170, 0, 0.08);
            border-color: var(--term-amber);
            color: var(--term-amber);
            font-size: 9px;
            text-align: center;
            margin: 8px 20px;
        }
        
        .message.system::after {
            content: var(--system-label, 'SYSTEM');
            position: absolute;
            top: -14px;
            right: 0;
            font-size: 7px;
            color: var(--term-amber);
            letter-spacing: 1px;
        }
        
        /* Markdown styles */
        .message code {
            font-family: var(--font-mono);
            background: rgba(0, 0, 0, 0.4);
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .message pre {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            margin: 8px 0;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow-x: auto;
            position: relative;
        }
        
        .code-block-wrapper {
            position: relative;
            margin: 8px 0;
        }
        
        .code-block-wrapper pre {
            margin: 0;
            padding-top: 28px;
        }
        
        .copy-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0, 255, 136, 0.15);
            border: 1px solid var(--term-green);
            color: var(--term-green);
            font-family: var(--font-mono);
            font-size: 8px;
            font-weight: 600;
            letter-spacing: 1px;
            padding: 3px 8px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s ease;
            z-index: 5;
        }
        
        .copy-btn:hover {
            background: var(--term-green);
            color: #000;
            box-shadow: 0 0 8px var(--term-green);
        }
        
        .copy-btn.copied {
            background: var(--term-cyan);
            border-color: var(--term-cyan);
            color: #000;
        }
        
        .message pre code {
            background: transparent;
            padding: 0;
            border: none;
            font-size: 10px;
            line-height: 1.4;
        }
        
        .message strong {
            color: var(--term-green);
            font-weight: 600;
        }
        
        .message em {
            font-style: italic;
            opacity: 0.9;
        }
        
        .message ul, .message ol {
            margin: 6px 0 6px 16px;
            padding: 0;
        }
        
        .message li {
            margin: 3px 0;
        }
        
        .message a {
            color: var(--term-cyan);
            text-decoration: none;
            border-bottom: 1px dotted var(--term-cyan);
        }
        
        .message a:hover {
            text-shadow: 0 0 6px var(--term-cyan);
        }
        
        .message blockquote {
            margin: 6px 0;
            padding: 4px 10px;
            border-left: 2px solid var(--term-dim);
            opacity: 0.85;
        }
        
        .message p {
            margin: 4px 0;
        }
        
        .message p:first-child {
            margin-top: 0;
        }
        
        .message p:last-child {
            margin-bottom: 0;
        }
        
        .message.thinking {
            color: var(--term-dim);
            font-style: italic;
            animation: blink-cursor 1s step-end infinite;
        }
        
        @keyframes blink-cursor {
            50% { opacity: 0.5; }
        }
        
        /* Input area */
        .input-area {
            display: flex;
            flex-shrink: 0;
            padding: 10px;
            gap: 8px;
            background: linear-gradient(0deg, #0f120f 0%, #0a0c0a 100%);
            border-top: 1px solid rgba(0, 255, 136, 0.3);
        }
        
        .input-prefix {
            color: var(--term-green);
            font-size: 11px;
            padding: 8px 0;
            text-shadow: 0 0 4px var(--term-green);
        }
        
        .message-input {
            flex: 1;
            font-family: var(--font-mono);
            font-size: 11px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #ddd;
            padding: 8px 10px;
            outline: none;
            transition: all 0.2s ease;
        }
        
        .message-input:focus {
            border-color: var(--term-green);
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.2), inset 0 0 20px rgba(0, 255, 136, 0.03);
        }
        
        .message-input::placeholder {
            color: #334433;
        }
        
        .send-btn {
            font-family: var(--font-mono);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--term-green);
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--term-green);
            padding: 8px 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .send-btn:hover {
            background: var(--term-green);
            color: #000;
            box-shadow: 0 0 12px var(--term-green);
        }
        
        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        /* Controls bar */
        .controls-bar {
            display: flex;
            flex-shrink: 0;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 6px 10px;
            background: rgba(0, 0, 0, 0.4);
            border-top: 1px solid rgba(0, 255, 136, 0.15);
        }
        
        .control-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .control-label {
            font-size: 8px;
            letter-spacing: 1px;
            color: var(--term-dim);
            font-family: var(--font-mono);
        }
        
        .control-select {
            font-family: var(--font-mono);
            font-size: 8px;
            letter-spacing: 0.5px;
            color: var(--term-green);
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--term-dim);
            padding: 3px 6px;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
        }
        
        .control-select:hover,
        .control-select:focus {
            border-color: var(--term-green);
            box-shadow: 0 0 6px rgba(0, 255, 136, 0.3);
        }
        
        .control-select option {
            background: #0a0c0a;
            color: var(--term-green);
        }
        
        .control-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 8px;
            letter-spacing: 1px;
            color: var(--term-dim);
            cursor: pointer;
            padding: 4px 8px;
            border: 1px solid transparent;
            background: transparent;
            transition: all 0.2s ease;
            font-family: var(--font-mono);
        }
        
        .control-toggle:hover {
            border-color: var(--term-green);
            color: var(--term-green);
        }
        
        .control-toggle.active {
            color: var(--term-green);
            border-color: var(--term-green);
            background: rgba(0, 255, 136, 0.1);
            text-shadow: 0 0 4px var(--term-green);
        }
        
        .toggle-indicator {
            width: 8px;
            height: 8px;
            border: 1px solid currentColor;
            position: relative;
        }
        
        .control-toggle.active .toggle-indicator::after {
            content: '';
            position: absolute;
            top: 1px;
            left: 1px;
            right: 1px;
            bottom: 1px;
            background: currentColor;
            box-shadow: 0 0 4px currentColor;
        }
        
        .control-divider {
            width: 1px;
            height: 14px;
            background: var(--term-dim);
            opacity: 0.3;
        }
        
        /* Scrollbar */
        .messages-area::-webkit-scrollbar {
            width: 4px;
        }
        
        .messages-area::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
        }
        
        .messages-area::-webkit-scrollbar-thumb {
            background: var(--term-green);
            border-radius: 2px;
        }
    </style>
</head>
<body>

        <div class="input-area">
            <span class="input-prefix">&gt;</span>

        <div class="controls-bar">
            <div class="control-group">
                <span class="control-label" id="label-mov">MOV</span>

                    <option value="none">NONE</option>
                    <option value="bounce">BOUNCE</option>

                <select class="control-select" id="select-color">
                    <option value="#ff3344">RED</option>
                    <option value="#00ffff">CYAN</option>
                    <option value="#39ff14">GREEN</option>
                    <option value="#bf00ff">PURPLE</option>
                    <option value="#ff1493">PINK</option>
                    <option value="#ff6600">ORANGE</option>
                    <option value="#ffd700">YELLOW</option>
                    <option value="#00bfff">BLUE</option>
                    <option value="#00ff00">LIME</option>
                    <option value="#ffffff">WHITE</option>
                </select>

            <span class="control-divider"></span>
            <button class="control-toggle" id="toggle-expression-only" title="Expression only (no text)">
                <span class="toggle-indicator"></span>
                <span class="toggle-label" id="label-expr">EXPR</span>
            </button>
            <span class="control-divider"></span>

                <span class="toggle-indicator"></span>
                <span class="toggle-label">中文</span>

    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('send-btn');
        const closeBtn = document.getElementById('close-btn');
        const timestampEl = document.getElementById('timestamp');
        const sessionIdEl = document.getElementById('session-id');
        
        let chatHistory = [];
        let isSending = false;
        
        // Simple markdown parser
        function parseMarkdown(text) {
            // Escape HTML first
            let html = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            
            // Code blocks (```)
            html = html.replace(/```([\s\S]*?)```/g, '<div class="code-block-wrapper"><button class="copy-btn" onclick="copyCode(this)">COPY</button><pre><code>$1</code></pre></div>');
            
            // Inline code (`)
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // Bold (**text** or __text__)
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__([^_]+)__/g, '<strong>$1</strong>');
            
            // Italic (*text* or _text_)
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            html = html.replace(/_([^_]+)_/g, '<em>$1</em>');
            
            // Links [text](url)
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
            
            // Blockquotes (>)
            html = html.replace(/^&gt; ?(.*)$/gm, '<blockquote>$1</blockquote>');
            
            // Unordered lists (- or *)
            html = html.replace(/^[\-\*] (.*)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
            
            // Ordered lists (1. 2. etc)
            html = html.replace(/^\d+\. (.*)$/gm, '<li>$1</li>');
            
            // Paragraphs (double newlines)
            html = html.replace(/\n\n/g, '</p><p>');
            
            // Single newlines to <br> (only outside code blocks)
            html = html.replace(/\n/g, '<br>');
            
            // Clean up <br> inside pre tags
            html = html.replace(/<pre><code>([\s\S]*?)<\/code><\/pre>/g, (match, code) => {
                return '<pre><code>' + code.replace(/<br>/g, '\n') + '</code></pre>';
            });
            
            return html;
        }
        
        // Generate session ID
        sessionIdEl.textContent = 'RG-' + Math.random().toString(36).substr(2, 4).toUpperCase();
        
        // Detect OS
        const osInfoEl = document.getElementById('os-info');
        function detectOS() {
            const ua = navigator.userAgent;
            if (ua.includes('Windows NT 10')) return 'WIN11/10';
            if (ua.includes('Windows NT 6.3')) return 'WIN8.1';
            if (ua.includes('Windows NT 6.2')) return 'WIN8';
            if (ua.includes('Windows NT 6.1')) return 'WIN7';
            if (ua.includes('Windows')) return 'WINDOWS';
            if (ua.includes('Mac OS X')) return 'MACOS';
            if (ua.includes('Linux')) return 'LINUX';
            if (ua.includes('Android')) return 'ANDROID';
            if (ua.includes('iOS')) return 'IOS';
            return 'UNKNOWN';
        }
        osInfoEl.textContent = detectOS();
        
        // Update timestamp
        function updateTimestamp() {
            const now = new Date();
            timestampEl.textContent = now.toTimeString().split(' ')[0];
        }
        updateTimestamp();
        setInterval(updateTimestamp, 1000);
        
        // Close button
        closeBtn.addEventListener('click', () => {
            window.electronAPI.closeChat();
        });
        
        // Get current time string
        function getTimeStr() {
            return new Date().toTimeString().split(' ')[0];
        }
        
        // Add message to UI
        function addMessage(role, content, isThinking = false) {
            const t = translations[currentLang];
            const msgEl = document.createElement('div');
            msgEl.className = `message ${role}${isThinking ? ' thinking' : ''}`;
            msgEl.setAttribute('data-time', getTimeStr());
            
            // Set language-aware labels via CSS custom properties
            if (role === 'user') {
                msgEl.style.setProperty('--operator-label', '"' + t.operator + '"');
            } else if (role === 'assistant') {
                msgEl.style.setProperty('--bro-label', '"' + t.bro + '"');
            } else if (role === 'system') {
                msgEl.style.setProperty('--system-label', '"' + t.system + '"');
            }
            
            // Parse markdown for assistant messages, plain text for others
            if (role === 'assistant' && !isThinking) {
                msgEl.innerHTML = parseMarkdown(content);
                // Update copy button text based on language
                msgEl.querySelectorAll('.copy-btn').forEach(btn => {
                    btn.textContent = t.copy;
                    btn.setAttribute('data-copy', t.copy);
                    btn.setAttribute('data-copied', t.copied);
                });
            } else {
                msgEl.textContent = content;
            }
            
            messagesEl.appendChild(msgEl);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return msgEl;
        }
        
        // Send message
        async function sendMessage() {
            const message = inputEl.value.trim();
            if (!message || isSending) return;
            
            inputEl.value = '';
            addMessage('user', message);
            chatHistory.push({ role: 'user', content: message });
            
            // Award XP for sending a message
            if (window.electronAPI && window.electronAPI.addXp) {
                window.electronAPI.addXp(5, 'message-send');
            }
            
            isSending = true;
            sendBtn.disabled = true;
            const t = translations[currentLang];
            const thinkingEl = addMessage('assistant', t.processing, true);
            
            window.electronAPI.chatMood('thinking');
            
            try {
                const response = await window.electronAPI.sendChatMessage(chatHistory);
                
                if (thinkingEl) thinkingEl.remove();
                
                if (response.error) {
                    addMessage('system', t.err + ': ' + response.error);
                    window.electronAPI.chatMood('error');
                } else {
                    addMessage('assistant', response.content);
                    chatHistory.push({ role: 'assistant', content: response.content });
                    window.electronAPI.chatMood('success');
                }
            } catch (e) {
                if (thinkingEl) thinkingEl.remove();
                addMessage('system', t.linkFailure + ': ' + e.message);
                window.electronAPI.chatMood('error');
            } finally {
                isSending = false;
                sendBtn.disabled = false;
                inputEl.focus();
            }
        }
        
        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        // Listen for config status
        window.electronAPI.onChatReady((data) => {
            const t = translations[currentLang];
            if (!data.configured) {
                addMessage('system', t.commsOffline);
            } else {
                addMessage('assistant', t.linkEstablished);
            }
            
            // Preselect movement mode from current state
            if (data.movementMode) {
                selectMovement.value = data.movementMode;
            }
            
            // Preselect color from current state
            if (data.color) {
                selectColor.value = data.color;
                applyColor(data.color);
            }
            
            // Preselect expression-only toggle from current state
            if (data.expressionOnly) {
                toggleExpressionOnly.classList.add('active');
            }
            
            // Initialize XP display
            if (data.xp) {
                updateXpDisplay(data.xp, false);
            }
        });
        
        // Color sync from main window
        function applyColor(color) {
            document.documentElement.style.setProperty('--term-green', color);
            document.documentElement.style.setProperty('--term-dim', color + '88');
            document.documentElement.style.setProperty('--term-grid', color + '08');
        }
        
        if (window.electronAPI && window.electronAPI.onSetColor) {
            window.electronAPI.onSetColor(applyColor);
        }
        
        // Focus input on load
        inputEl.focus();
        
        // Copy code block content
        function copyCode(btn) {
            const codeEl = btn.parentElement.querySelector('code');
            const text = codeEl.textContent || codeEl.innerText;
            const t = translations[currentLang];
            
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = t.copied;
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = t.copy;
                    btn.classList.remove('copied');
                }, 1500);
            }).catch(() => {
                btn.textContent = t.error;
                setTimeout(() => { btn.textContent = t.copy; }, 1500);
            });
        }
        
        // Expose to onclick handlers
        window.copyCode = copyCode;
        
        // Control elements
        const selectMovement = document.getElementById('select-movement');
        const selectColor = document.getElementById('select-color');
        const toggleLang = document.getElementById('toggle-lang');
        const toggleExpressionOnly = document.getElementById('toggle-expression-only');
        const labelMov = document.getElementById('label-mov');
        const labelCol = document.getElementById('label-col');
        const labelExpr = document.getElementById('label-expr');
        const toggleStats = document.getElementById('toggle-stats');
        const togglePomo = document.getElementById('toggle-pomo');
        const labelStats = document.getElementById('label-stats');
        const labelPomo = document.getElementById('label-pomo');
        
        // XP elements
        const levelBar = document.getElementById('level-bar');
        const levelBadge = document.getElementById('level-badge');
        const rankBadge = document.getElementById('rank-badge');
        const xpLabel = document.getElementById('xp-label');
        const xpPercent = document.getElementById('xp-percent');
        const xpFill = document.getElementById('xp-fill');
        const xpTotal = document.getElementById('xp-total');
        
        // Needs elements
        const needsBar = document.getElementById('needs-bar');
        const hungerFill = document.getElementById('hunger-fill');
        const hungerValue = document.getElementById('hunger-value');
        const energyFill = document.getElementById('energy-fill');
        const energyValue = document.getElementById('energy-value');
        
        // Stats elements
        const statsPanel = document.getElementById('stats-panel');
        const statUptime = document.getElementById('stat-uptime');
        const statClicks = document.getElementById('stat-clicks');
        const statMessages = document.getElementById('stat-messages');
        const statSessions = document.getElementById('stat-sessions');
        const statStreak = document.getElementById('stat-streak');
        const statBest = document.getElementById('stat-best');
        
        // Pomodoro elements
        const pomodoroBar = document.getElementById('pomodoro-bar');
        const pomoMode = document.getElementById('pomo-mode');
        const pomoTimer = document.getElementById('pomo-timer');
        const pomoFill = document.getElementById('pomo-fill');
        const pomoCount = document.getElementById('pomo-count');
        const pomoStopBtn = document.getElementById('pomo-stop-btn');
        
        // Format time helper
        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return minutes.toString().padStart(2, '0') + ':' + seconds.toString().padStart(2, '0');
        }
        
        function formatUptime(ms) {
            const hours = Math.floor(ms / 3600000);
            const minutes = Math.floor((ms % 3600000) / 60000);
            return hours + 'h ' + minutes + 'm';
        }
        
        // Update XP display
        function updateXpDisplay(xpData, animate = false) {
            if (!xpData) return;
            
            const { level, totalXp, xpIntoLevel, xpNeeded, progress, leveledUp, leveledDown, xpLost, source,
                    rank, rankZh, totalClicks, totalMessages, totalSessions, totalUptimeMs, currentStreak, longestStreak,
                    hunger, energy } = xpData;
            
            levelBadge.textContent = 'LV ' + level;
            xpLabel.textContent = 'XP: ' + xpIntoLevel + ' / ' + xpNeeded;
            xpPercent.textContent = Math.round(progress * 100) + '%';
            xpFill.style.width = (progress * 100) + '%';
            xpTotal.textContent = 'TOTAL: ' + totalXp;
            
            // Update rank
            if (rank) {
                rankBadge.textContent = currentLang === 'zh' ? rankZh : rank;
            }
            
            // Update stats
            if (totalUptimeMs !== undefined) {
                statUptime.textContent = formatUptime(totalUptimeMs);
            }
            if (totalClicks !== undefined) {
                statClicks.textContent = totalClicks;
            }
            if (totalMessages !== undefined) {
                statMessages.textContent = totalMessages;
            }
            if (totalSessions !== undefined) {
                statSessions.textContent = totalSessions;
            }
            if (currentStreak !== undefined) {
                statStreak.textContent = currentStreak + (currentLang === 'zh' ? ' 天' : ' days');
            }
            if (longestStreak !== undefined) {
                statBest.textContent = longestStreak + (currentLang === 'zh' ? ' 天' : ' days');
            }
            
            // Update needs
            if (hunger !== undefined) {
                updateNeedsDisplay({ hunger, energy });
            }
            
            // Level up animation
            if (leveledUp && animate) {
                levelBar.classList.add('level-up-flash');
                levelBadge.style.animation = 'none';
                levelBadge.offsetHeight; // Trigger reflow
                levelBadge.style.animation = 'level-up-glow 1s ease-out';
                
                // Add level up message with rank
                const newRank = currentLang === 'zh' ? rankZh : rank;
                const lvlMsg = currentLang === 'zh' 
                    ? '🎉 等级提升！已达到 ' + level + ' 级！ [' + newRank + ']'
                    : '🎉 LEVEL UP! Now level ' + level + '! [' + newRank + ']';
                addMessage('system', lvlMsg);
                
                setTimeout(() => {
                    levelBar.classList.remove('level-up-flash');
                }, 500);
            }
            
            // Level down animation (from decay)
            if (leveledDown && animate) {
                levelBar.classList.add('level-down-flash');
                
                const lvlMsg = currentLang === 'zh' 
                    ? '📉 等级下降！降至 ' + level + ' 级...'
                    : '📉 LEVEL DOWN! Dropped to level ' + level + '...';
                addMessage('system', lvlMsg);
                
                setTimeout(() => {
                    levelBar.classList.remove('level-down-flash');
                }, 500);
            }
            
            // XP loss indicator (subtle flash for decay)
            if (xpLost && animate && source && (source === 'idle-decay' || source === 'attention-neglect')) {
                xpTotal.classList.add('xp-loss-flash');
                setTimeout(() => {
                    xpTotal.classList.remove('xp-loss-flash');
                }, 300);
            }
        }
        
        // Update needs display
        function updateNeedsDisplay(needs) {
            if (!needs) return;
            
            const { hunger, energy, hungerLow, energyLow } = needs;
            
            hungerFill.style.width = hunger + '%';
            hungerValue.textContent = Math.round(hunger);
            
            energyFill.style.width = energy + '%';
            energyValue.textContent = Math.round(energy);
            
            // Low state styling
            if (hunger < 30 || hungerLow) {
                hungerFill.classList.add('low');
            } else {
                hungerFill.classList.remove('low');
            }
            
            if (energy < 30 || energyLow) {
                energyFill.classList.add('low');
            } else {
                energyFill.classList.remove('low');
            }
        }
        
        // Update pomodoro display
        function updatePomodoroDisplay(data) {
            if (!data) return;
            
            const { active, mode, remaining, duration, pomosCompleted, progress } = data;
            
            if (active) {
                pomodoroBar.classList.add('visible');
                togglePomo.classList.add('active');
                
                pomodoroBar.classList.toggle('work-mode', mode === 'work');
                pomodoroBar.classList.toggle('break-mode', mode === 'break');
                
                pomoMode.textContent = mode === 'work' ? 
                    (currentLang === 'zh' ? '专注' : 'WORK') : 
                    (currentLang === 'zh' ? '休息' : 'BREAK');
                pomoMode.className = 'pomo-mode ' + mode;
                
                pomoTimer.textContent = formatTime(remaining);
                pomoFill.style.width = (progress * 100) + '%';
            } else {
                pomodoroBar.classList.remove('visible');
                togglePomo.classList.remove('active');
            }
            
            pomoCount.textContent = '🍅 ' + pomosCompleted;
        }
        
        // Listen for XP updates from main process
        if (window.electronAPI && window.electronAPI.onXpUpdate) {
            window.electronAPI.onXpUpdate((xpData) => {
                updateXpDisplay(xpData, true);
            });
        }
        
        // Attention event listener
        if (window.electronAPI && window.electronAPI.onAttentionEvent) {
            window.electronAPI.onAttentionEvent((data) => {
                if (data.active) {
                    // Show attention warning in chat
                    levelBar.classList.add('attention-warning');
                    const msg = currentLang === 'zh' 
                        ? '⚠️ 连接不稳定！确认信号！(每30秒损失XP)'
                        : '⚠️ LINK UNSTABLE! Confirm signal! (Losing XP every 30s)';
                    addMessage('system', msg);
                } else {
                    levelBar.classList.remove('attention-warning');
                    if (data.resolved) {
                        const msg = currentLang === 'zh' 
                            ? '✅ 握手确认！连接已恢复！'
                            : '✅ HANDSHAKE CONFIRMED! Link restored!';
                        addMessage('system', msg);
                    }
                }
            });
        }
        
        // Needs update listener
        if (window.electronAPI && window.electronAPI.onNeedsUpdate) {
            window.electronAPI.onNeedsUpdate((data) => {
                updateNeedsDisplay(data);
            });
        }
        
        // Pomodoro update listener
        if (window.electronAPI && window.electronAPI.onPomodoroUpdate) {
            window.electronAPI.onPomodoroUpdate((data) => {
                updatePomodoroDisplay(data);
            });
        }
        
        // Pomodoro complete listener
        if (window.electronAPI && window.electronAPI.onPomodoroComplete) {
            window.electronAPI.onPomodoroComplete((data) => {
                const { mode, pomosCompleted, nextMode } = data;
                let msg;
                if (mode === 'work') {
                    msg = currentLang === 'zh' 
                        ? '🍅 专注完成！已完成 ' + pomosCompleted + ' 个番茄钟。休息一下？'
                        : '🍅 FOCUS SESSION COMPLETE! ' + pomosCompleted + ' pomodoros. Time for a break?';
                } else {
                    msg = currentLang === 'zh' 
                        ? '☕ 休息结束！准备好继续了吗？'
                        : '☕ BREAK OVER! Ready to focus?';
                }
                addMessage('system', msg);
            });
        }
        
        // Stats toggle
        toggleStats.addEventListener('click', () => {
            toggleStats.classList.toggle('active');
            statsPanel.classList.toggle('visible');
        });
        
        // Pomodoro toggle (start/stop)
        togglePomo.addEventListener('click', () => {
            if (togglePomo.classList.contains('active')) {
                // Already active, stop it
                if (window.electronAPI && window.electronAPI.pomodoroStop) {
                    window.electronAPI.pomodoroStop();
                }
            } else {
                // Start pomodoro
                if (window.electronAPI && window.electronAPI.pomodoroStart) {
                    window.electronAPI.pomodoroStart('work');
                    const msg = currentLang === 'zh' 
                        ? '🍅 番茄钟开始！专注25分钟...'
                        : '🍅 POMODORO STARTED! Focus for 25 minutes...';
                    addMessage('system', msg);
                }
            }
        });
        
        // Pomodoro stop button
        pomoStopBtn.addEventListener('click', () => {
            if (window.electronAPI && window.electronAPI.pomodoroStop) {
                window.electronAPI.pomodoroStop();
                const msg = currentLang === 'zh' 
                    ? '⏹️ 番茄钟已停止'
                    : '⏹️ POMODORO STOPPED';
                addMessage('system', msg);
            }
        });
        
        // Translations
        const translations = {
            en: {
                classification: 'RB//WR',
                title: 'SIGINT TERMINAL',
                encrypted: 'ENCRYPTED',
                session: 'SESSION',
                placeholder: 'ENTER QUERY...',
                send: 'XMIT',
                processing: 'PROCESSING...',
                linkEstablished: 'LINK ESTABLISHED. AWAITING QUERY.',
                commsOffline: 'COMMS OFFLINE — Configure LLM endpoint via system tray',
                linkFailure: 'LINK FAILURE',
                err: 'ERR',
                copy: 'COPY',
                copied: 'COPIED',
                error: 'ERROR',
                operator: 'OPERATOR',
                bro: 'BRO',
                system: 'SYSTEM',
                mov: 'MOV',
                col: 'COL',
                expr: 'EXPR',
                stats: 'STAT',
                pomo: 'POMO',
                hunger: 'PWR',
                energy: 'BND',
                uptime: 'UPTIME',
                clicks: 'CLICKS',
                msgs: 'MSGS',
                sessions: 'SESSIONS',
                streak: 'STREAK',
                best: 'BEST',
                days: 'days',
                langToggle: '中文',
                movOptions: { none: 'NONE', bounce: 'BOUNCE', follow: 'FOLLOW', wander: 'WANDER' },
                colOptions: { '#ff3344': 'RED', '#00ffff': 'CYAN', '#39ff14': 'GREEN', '#bf00ff': 'PURPLE', '#ff1493': 'PINK', '#ff6600': 'ORANGE', '#ffd700': 'YELLOW', '#00bfff': 'BLUE', '#00ff00': 'LIME', '#ffffff': 'WHITE' }
            },
            zh: {
                classification: '机密//绝密',
                title: '信号情报终端',
                encrypted: '已加密',
                session: '会话',
                placeholder: '输入查询...',
                send: '发送',
                processing: '处理中...',
                linkEstablished: '链接已建立，等待查询。',
                commsOffline: '通讯离线 — 通过系统托盘配置LLM端点',
                linkFailure: '链接失败',
                err: '错误',
                copy: '复制',
                copied: '已复制',
                error: '错误',
                operator: '操作员',
                bro: '兄弟',
                system: '系统',
                mov: '动作',
                col: '颜色',
                expr: '表情',
                stats: '统计',
                pomo: '番茄',
                hunger: '能量',
                energy: '带宽',
                uptime: '运行',
                clicks: '点击',
                msgs: '消息',
                sessions: '会话',
                streak: '连续',
                best: '最佳',
                days: '天',
                langToggle: 'EN',
                movOptions: { none: '无', bounce: '弹跳', follow: '跟随', wander: '漫游' },
                colOptions: { '#ff3344': '红', '#00ffff': '青', '#39ff14': '绿', '#bf00ff': '紫', '#ff1493': '粉', '#ff6600': '橙', '#ffd700': '黄', '#00bfff': '蓝', '#00ff00': '草绿', '#ffffff': '白' }
            }
        };
        
        let currentLang = 'en';
        
        function updateLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            
            // Update static UI elements
            document.querySelector('.classification').textContent = t.classification;
            document.querySelector('.terminal-title').textContent = t.title;
            document.querySelector('.status-indicator span:last-child').textContent = t.encrypted;
            document.querySelector('.info-bar span:first-child').innerHTML = t.session + ': <span id="session-id">' + sessionIdEl.textContent + '</span>';
            inputEl.placeholder = t.placeholder;
            sendBtn.textContent = t.send;
            
            // Update control labels
            labelMov.textContent = t.mov;
            labelCol.textContent = t.col;
            labelExpr.textContent = t.expr;
            labelStats.textContent = t.stats;
            labelPomo.textContent = t.pomo;
            toggleLang.querySelector('.toggle-label').textContent = t.langToggle;
            
            // Update needs labels
            document.getElementById('label-hunger').textContent = t.hunger;
            document.getElementById('label-energy').textContent = t.energy;
            
            // Update stats labels
            document.getElementById('label-uptime').textContent = t.uptime;
            document.getElementById('label-clicks').textContent = t.clicks;
            document.getElementById('label-msgs').textContent = t.msgs;
            document.getElementById('label-sessions').textContent = t.sessions;
            document.getElementById('label-streak').textContent = t.streak;
            document.getElementById('label-best').textContent = t.best;
            
            // Update dropdown options
            Array.from(selectMovement.options).forEach(opt => {
                opt.textContent = t.movOptions[opt.value];
            });
            Array.from(selectColor.options).forEach(opt => {
                opt.textContent = t.colOptions[opt.value];
            });
            
            // Update copy buttons
            document.querySelectorAll('.copy-btn').forEach(btn => {
                if (!btn.classList.contains('copied')) {
                    btn.textContent = t.copy;
                }
            });
            
            // Update message labels
            document.querySelectorAll('.message.user').forEach(msg => {
                msg.style.setProperty('--operator-label', '"' + t.operator + '"');
            });
            document.querySelectorAll('.message.assistant').forEach(msg => {
                msg.style.setProperty('--bro-label', '"' + t.bro + '"');
            });
            document.querySelectorAll('.message.system').forEach(msg => {
                msg.style.setProperty('--system-label', '"' + t.system + '"');
            });
        }
        
        // Movement select
        selectMovement.addEventListener('change', () => {
            const mode = selectMovement.value;
            if (window.electronAPI && window.electronAPI.setMovementMode) {
                window.electronAPI.setMovementMode(mode);
            }
        });
        
        // Color select
        selectColor.addEventListener('change', () => {
            const color = selectColor.value;
            applyColor(color);
            if (window.electronAPI && window.electronAPI.setColor) {
                window.electronAPI.setColor(color);
            }
        });
        
        // Expression-only toggle (hides status text, shows only face)
        toggleExpressionOnly.addEventListener('click', () => {
            toggleExpressionOnly.classList.toggle('active');
            const enabled = toggleExpressionOnly.classList.contains('active');
            if (window.electronAPI && window.electronAPI.setExpressionOnly) {
                window.electronAPI.setExpressionOnly(enabled);
            }
        });
        
        // Language toggle
        toggleLang.addEventListener('click', () => {
            toggleLang.classList.toggle('active');
            const newLang = toggleLang.classList.contains('active') ? 'zh' : 'en';
            updateLanguage(newLang);
            if (window.electronAPI && window.electronAPI.setLanguage) {
                window.electronAPI.setLanguage(newLang);
            }
        });
        
        // Listen for movement mode changes from main process
        if (window.electronAPI && window.electronAPI.onMovementModeChange) {
            window.electronAPI.onMovementModeChange((mode) => {
                selectMovement.value = mode;
            });
        }
        
        // Listen for language changes from main process
        if (window.electronAPI && window.electronAPI.onSetLanguage) {
            window.electronAPI.onSetLanguage((lang) => {
                if (lang === 'zh' && !toggleLang.classList.contains('active')) {
                    toggleLang.classList.add('active');
                } else if (lang === 'en' && toggleLang.classList.contains('active')) {
                    toggleLang.classList.remove('active');
                }
                updateLanguage(lang);
            });
        }
    </script>
</body>
</html>
