<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
    <title>COMMS Terminal</title>
    <style>
        :root {
            --term-green: #00ff88;
            --term-cyan: #00d4ff;
            --term-amber: #ffaa00;
            --term-red: #ff3344;
            --term-dim: #446655;
            --term-bg: #0a0c0a;
            --term-grid: rgba(0, 255, 136, 0.03);
            --font-mono: 'Consolas', 'Courier New', monospace;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--term-bg);
            font-family: var(--font-mono);
        }
        
        /* Scanline overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.15) 2px,
                rgba(0, 0, 0, 0.15) 4px
            );
            pointer-events: none;
            z-index: 1000;
        }
        
        /* Grid background */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(var(--term-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--term-grid) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            z-index: -1;
        }
        
        .terminal-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            border: 1px solid var(--term-green);
            position: relative;
        }
        
        /* Corner brackets */
        .terminal-container::before,
        .terminal-container::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border-color: var(--term-green);
            border-style: solid;
            z-index: 10;
        }
        .terminal-container::before {
            top: 4px;
            left: 4px;
            border-width: 2px 0 0 2px;
        }
        .terminal-container::after {
            bottom: 4px;
            right: 4px;
            border-width: 0 2px 2px 0;
        }
        
        /* Header */
        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: linear-gradient(180deg, #0f120f 0%, #080a08 100%);
            border-bottom: 1px solid var(--term-green);
            -webkit-app-region: drag;
            cursor: grab;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .classification {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--term-red);
            background: rgba(255, 51, 68, 0.15);
            padding: 2px 6px;
            border: 1px solid var(--term-red);
        }
        
        .terminal-title {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: var(--term-green);
            text-shadow: 0 0 8px var(--term-green);
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 8px;
            color: var(--term-dim);
            letter-spacing: 1px;
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--term-green);
            box-shadow: 0 0 6px var(--term-green);
            animation: pulse-dot 2s ease-in-out infinite;
        }
        
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .close-btn {
            -webkit-app-region: no-drag;
            background: transparent;
            border: 1px solid var(--term-dim);
            color: var(--term-dim);
            font-size: 12px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .close-btn:hover {
            border-color: var(--term-red);
            color: var(--term-red);
            box-shadow: 0 0 8px rgba(255, 51, 68, 0.5);
        }
        
        /* Info bar */
        .info-bar {
            display: flex;
            justify-content: space-between;
            padding: 4px 12px;
            background: rgba(0, 255, 136, 0.03);
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
            font-size: 8px;
            color: var(--term-dim);
            letter-spacing: 1px;
        }
        
        .timestamp {
            font-variant-numeric: tabular-nums;
        }
        
        /* Messages area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, transparent 100%);
        }
        
        .message {
            margin-bottom: 12px;
            padding: 8px 10px;
            font-size: 11px;
            line-height: 1.5;
            border-left: 2px solid;
            position: relative;
        }
        
        .message::before {
            content: attr(data-time);
            position: absolute;
            top: -14px;
            left: 0;
            font-size: 7px;
            color: var(--term-dim);
            letter-spacing: 1px;
        }
        
        .message.user {
            background: rgba(0, 212, 255, 0.08);
            border-color: var(--term-cyan);
            color: #aaddff;
            margin-left: 24px;
        }
        
        .message.user::after {
            content: 'OPERATOR';
            position: absolute;
            top: -14px;
            right: 0;
            font-size: 7px;
            color: var(--term-cyan);
            letter-spacing: 1px;
        }
        
        .message.assistant {
            background: rgba(0, 255, 136, 0.06);
            border-color: var(--term-green);
            color: #aaffcc;
            margin-right: 24px;
        }
        
        .message.assistant::after {
            content: 'BRO';
            position: absolute;
            top: -14px;
            right: 0;
            font-size: 7px;
            color: var(--term-green);
            letter-spacing: 1px;
        }
        
        .message.system {
            background: rgba(255, 170, 0, 0.08);
            border-color: var(--term-amber);
            color: var(--term-amber);
            font-size: 9px;
            text-align: center;
            margin: 8px 20px;
        }
        
        .message.system::after {
            content: 'SYSTEM';
            position: absolute;
            top: -14px;
            right: 0;
            font-size: 7px;
            color: var(--term-amber);
            letter-spacing: 1px;
        }
        
        /* Markdown styles */
        .message code {
            font-family: var(--font-mono);
            background: rgba(0, 0, 0, 0.4);
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .message pre {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            margin: 8px 0;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow-x: auto;
            position: relative;
        }
        
        .code-block-wrapper {
            position: relative;
            margin: 8px 0;
        }
        
        .code-block-wrapper pre {
            margin: 0;
            padding-top: 28px;
        }
        
        .copy-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0, 255, 136, 0.15);
            border: 1px solid var(--term-green);
            color: var(--term-green);
            font-family: var(--font-mono);
            font-size: 8px;
            font-weight: 600;
            letter-spacing: 1px;
            padding: 3px 8px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s ease;
            z-index: 5;
        }
        
        .copy-btn:hover {
            background: var(--term-green);
            color: #000;
            box-shadow: 0 0 8px var(--term-green);
        }
        
        .copy-btn.copied {
            background: var(--term-cyan);
            border-color: var(--term-cyan);
            color: #000;
        }
        
        .message pre code {
            background: transparent;
            padding: 0;
            border: none;
            font-size: 10px;
            line-height: 1.4;
        }
        
        .message strong {
            color: var(--term-green);
            font-weight: 600;
        }
        
        .message em {
            font-style: italic;
            opacity: 0.9;
        }
        
        .message ul, .message ol {
            margin: 6px 0 6px 16px;
            padding: 0;
        }
        
        .message li {
            margin: 3px 0;
        }
        
        .message a {
            color: var(--term-cyan);
            text-decoration: none;
            border-bottom: 1px dotted var(--term-cyan);
        }
        
        .message a:hover {
            text-shadow: 0 0 6px var(--term-cyan);
        }
        
        .message blockquote {
            margin: 6px 0;
            padding: 4px 10px;
            border-left: 2px solid var(--term-dim);
            opacity: 0.85;
        }
        
        .message p {
            margin: 4px 0;
        }
        
        .message p:first-child {
            margin-top: 0;
        }
        
        .message p:last-child {
            margin-bottom: 0;
        }
        
        .message.thinking {
            color: var(--term-dim);
            font-style: italic;
            animation: blink-cursor 1s step-end infinite;
        }
        
        @keyframes blink-cursor {
            50% { opacity: 0.5; }
        }
        
        /* Input area */
        .input-area {
            display: flex;
            padding: 10px;
            gap: 8px;
            background: linear-gradient(0deg, #0f120f 0%, #0a0c0a 100%);
            border-top: 1px solid rgba(0, 255, 136, 0.3);
        }
        
        .input-prefix {
            color: var(--term-green);
            font-size: 11px;
            padding: 8px 0;
            text-shadow: 0 0 4px var(--term-green);
        }
        
        .message-input {
            flex: 1;
            font-family: var(--font-mono);
            font-size: 11px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #ddd;
            padding: 8px 10px;
            outline: none;
            transition: all 0.2s ease;
        }
        
        .message-input:focus {
            border-color: var(--term-green);
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.2), inset 0 0 20px rgba(0, 255, 136, 0.03);
        }
        
        .message-input::placeholder {
            color: #334433;
        }
        
        .send-btn {
            font-family: var(--font-mono);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--term-green);
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--term-green);
            padding: 8px 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .send-btn:hover {
            background: var(--term-green);
            color: #000;
            box-shadow: 0 0 12px var(--term-green);
        }
        
        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        /* Scrollbar */
        .messages-area::-webkit-scrollbar {
            width: 4px;
        }
        
        .messages-area::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
        }
        
        .messages-area::-webkit-scrollbar-thumb {
            background: var(--term-green);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="terminal-container">
        <div class="terminal-header">
            <div class="header-left">
                <span class="classification">RB//WR</span>
                <span class="terminal-title">SIGINT TERMINAL</span>
            </div>
            <div class="header-right">
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span>ENCRYPTED</span>
                </div>
                <button class="close-btn" id="close-btn">×</button>
            </div>
        </div>
        <div class="info-bar">
            <span>SESSION: <span id="session-id">RG-0000</span></span>
            <span class="timestamp" id="timestamp">--:--:--</span>
            <span>OS: <span id="os-info">DETECTING</span></span>
        </div>
        <div class="messages-area" id="messages"></div>
        <div class="input-area">
            <span class="input-prefix">&gt;</span>
            <input type="text" class="message-input" id="input" placeholder="ENTER QUERY..." autocomplete="off">
            <button class="send-btn" id="send-btn">XMIT</button>
        </div>
    </div>
    
    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('send-btn');
        const closeBtn = document.getElementById('close-btn');
        const timestampEl = document.getElementById('timestamp');
        const sessionIdEl = document.getElementById('session-id');
        
        let chatHistory = [];
        let isSending = false;
        
        // Simple markdown parser
        function parseMarkdown(text) {
            // Escape HTML first
            let html = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            
            // Code blocks (```)
            html = html.replace(/```([\s\S]*?)```/g, '<div class="code-block-wrapper"><button class="copy-btn" onclick="copyCode(this)">COPY</button><pre><code>$1</code></pre></div>');
            
            // Inline code (`)
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // Bold (**text** or __text__)
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__([^_]+)__/g, '<strong>$1</strong>');
            
            // Italic (*text* or _text_)
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            html = html.replace(/_([^_]+)_/g, '<em>$1</em>');
            
            // Links [text](url)
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
            
            // Blockquotes (>)
            html = html.replace(/^&gt; ?(.*)$/gm, '<blockquote>$1</blockquote>');
            
            // Unordered lists (- or *)
            html = html.replace(/^[\-\*] (.*)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
            
            // Ordered lists (1. 2. etc)
            html = html.replace(/^\d+\. (.*)$/gm, '<li>$1</li>');
            
            // Paragraphs (double newlines)
            html = html.replace(/\n\n/g, '</p><p>');
            
            // Single newlines to <br> (only outside code blocks)
            html = html.replace(/\n/g, '<br>');
            
            // Clean up <br> inside pre tags
            html = html.replace(/<pre><code>([\s\S]*?)<\/code><\/pre>/g, (match, code) => {
                return '<pre><code>' + code.replace(/<br>/g, '\n') + '</code></pre>';
            });
            
            return html;
        }
        
        // Generate session ID
        sessionIdEl.textContent = 'RG-' + Math.random().toString(36).substr(2, 4).toUpperCase();
        
        // Detect OS
        const osInfoEl = document.getElementById('os-info');
        function detectOS() {
            const ua = navigator.userAgent;
            if (ua.includes('Windows NT 10')) return 'WIN11/10';
            if (ua.includes('Windows NT 6.3')) return 'WIN8.1';
            if (ua.includes('Windows NT 6.2')) return 'WIN8';
            if (ua.includes('Windows NT 6.1')) return 'WIN7';
            if (ua.includes('Windows')) return 'WINDOWS';
            if (ua.includes('Mac OS X')) return 'MACOS';
            if (ua.includes('Linux')) return 'LINUX';
            if (ua.includes('Android')) return 'ANDROID';
            if (ua.includes('iOS')) return 'IOS';
            return 'UNKNOWN';
        }
        osInfoEl.textContent = detectOS();
        
        // Update timestamp
        function updateTimestamp() {
            const now = new Date();
            timestampEl.textContent = now.toTimeString().split(' ')[0];
        }
        updateTimestamp();
        setInterval(updateTimestamp, 1000);
        
        // Close button
        closeBtn.addEventListener('click', () => {
            window.electronAPI.closeChat();
        });
        
        // Get current time string
        function getTimeStr() {
            return new Date().toTimeString().split(' ')[0];
        }
        
        // Add message to UI
        function addMessage(role, content, isThinking = false) {
            const msgEl = document.createElement('div');
            msgEl.className = `message ${role}${isThinking ? ' thinking' : ''}`;
            msgEl.setAttribute('data-time', getTimeStr());
            
            // Parse markdown for assistant messages, plain text for others
            if (role === 'assistant' && !isThinking) {
                msgEl.innerHTML = parseMarkdown(content);
            } else {
                msgEl.textContent = content;
            }
            
            messagesEl.appendChild(msgEl);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return msgEl;
        }
        
        // Send message
        async function sendMessage() {
            const message = inputEl.value.trim();
            if (!message || isSending) return;
            
            inputEl.value = '';
            addMessage('user', message);
            chatHistory.push({ role: 'user', content: message });
            
            isSending = true;
            sendBtn.disabled = true;
            const thinkingEl = addMessage('assistant', 'PROCESSING...', true);
            
            window.electronAPI.chatMood('thinking');
            
            try {
                const response = await window.electronAPI.sendChatMessage(chatHistory);
                
                if (thinkingEl) thinkingEl.remove();
                
                if (response.error) {
                    addMessage('system', 'ERR: ' + response.error);
                    window.electronAPI.chatMood('error');
                } else {
                    addMessage('assistant', response.content);
                    chatHistory.push({ role: 'assistant', content: response.content });
                    window.electronAPI.chatMood('success');
                }
            } catch (e) {
                if (thinkingEl) thinkingEl.remove();
                addMessage('system', 'LINK FAILURE: ' + e.message);
                window.electronAPI.chatMood('error');
            } finally {
                isSending = false;
                sendBtn.disabled = false;
                inputEl.focus();
            }
        }
        
        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        // Listen for config status
        window.electronAPI.onChatReady((data) => {
            if (!data.configured) {
                addMessage('system', 'COMMS OFFLINE — Configure LLM endpoint via system tray');
            } else {
                addMessage('assistant', 'LINK ESTABLISHED. AWAITING QUERY.');
            }
        });
        
        // Color sync from main window
        function applyColor(color) {
            document.documentElement.style.setProperty('--term-green', color);
            document.documentElement.style.setProperty('--term-dim', color + '88');
            document.documentElement.style.setProperty('--term-grid', color + '08');
        }
        
        if (window.electronAPI && window.electronAPI.onSetColor) {
            window.electronAPI.onSetColor(applyColor);
        }
        
        // Focus input on load
        inputEl.focus();
        
        // Copy code block content
        function copyCode(btn) {
            const codeEl = btn.parentElement.querySelector('code');
            const text = codeEl.textContent || codeEl.innerText;
            
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = 'COPIED';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'COPY';
                    btn.classList.remove('copied');
                }, 1500);
            }).catch(() => {
                btn.textContent = 'ERROR';
                setTimeout(() => { btn.textContent = 'COPY'; }, 1500);
            });
        }
        
        // Expose to onclick handlers
        window.copyCode = copyCode;
    </script>
</body>
</html>
